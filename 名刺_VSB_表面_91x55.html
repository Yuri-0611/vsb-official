<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSB 名刺 表面 91×55mm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-soft: #4a4a4a;
      --gold: #b8964a;
      --gold-soft: #d4bc7a;
      --paper: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @page {
      size: 91mm 55mm;
      margin: 0;
    }

    body {
      margin: 0;
      background: #d8d8d8;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .sheet {
      width: 91mm;
      height: 55mm;
      margin: 12px auto;
      background: var(--paper);
      color: var(--ink);
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    }

    .brush {
      position: absolute;
      pointer-events: none;
      opacity: 0.42;
    }

    .brush-tl {
      top: -4mm;
      left: -2mm;
      width: 30mm;
      height: 20mm;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(184, 150, 74, 0.55), transparent 72%),
        radial-gradient(ellipse 55% 45% at 70% 20%, rgba(212, 188, 122, 0.35), transparent 70%);
      transform: rotate(-12deg);
    }

    .inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 30mm 1fr;
      gap: 2.5mm;
      height: 100%;
      padding: 3.2mm 3.5mm 3mm 3.2mm;
    }

    .photos {
      position: relative;
      align-self: center;
      width: 28mm;
      height: 40mm;
    }

    .photo {
      position: absolute;
      width: 21mm;
      height: 21mm;
      border-radius: 50%;
      border: 0.45mm solid var(--gold);
      object-fit: cover;
      background: #f2f2f2;
      box-shadow: 0 0.4mm 1.2mm rgba(0, 0, 0, 0.08);
    }

    .photo.top {
      top: 0;
      left: 0;
      z-index: 2;
      object-position: 50% 18%;
    }

    .photo.bottom {
      top: 15mm;
      left: 7mm;
      z-index: 1;
      object-position: 50% 35%;
    }

    .content {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: 0.2mm;
    }

    .head {
      font-family: "Noto Sans JP", sans-serif;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1.4mm;
      font-size: 5.2pt;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      font-family: "Noto Serif JP", serif;
      font-weight: 700;
      font-size: 6.2pt;
      letter-spacing: 0.08em;
    }

    .brand-rule {
      width: 0.35mm;
      height: 3.2mm;
      background: var(--gold);
      flex-shrink: 0;
    }

    .titles {
      margin-top: 1.1mm;
      font-size: 4.55pt;
      line-height: 1.42;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .name-block {
      margin-top: 1.4mm;
    }

    .name-ja {
      font-family: "Noto Serif JP", serif;
      font-weight: 700;
      font-size: 13pt;
      line-height: 1.1;
      letter-spacing: 0.08em;
    }

    .name-en {
      margin-top: 0.6mm;
      font-family: "Cormorant Garamond", "Noto Serif JP", serif;
      font-size: 8.2pt;
      line-height: 1;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .name-rule {
      margin-top: 1.3mm;
      width: 100%;
      height: 0.25mm;
      background: linear-gradient(90deg, var(--gold) 0%, rgba(184, 150, 74, 0.15) 100%);
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 24mm;
      gap: 2mm;
      align-items: end;
    }

    .contact {
      font-size: 4.35pt;
      line-height: 1.55;
      color: var(--ink-soft);
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 1mm;
      min-height: 3.2mm;
    }

    .icon {
      width: 3mm;
      height: 3mm;
      border-radius: 50%;
      border: 0.25mm solid var(--gold-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gold);
      font-size: 4.5pt;
      line-height: 1;
    }

    .contact-label {
      color: var(--ink);
      font-weight: 600;
    }

    .contact-value {
      color: var(--ink-soft);
    }

    .contact-value.blank::after {
      content: "\00a0";
    }

    .social {
      display: flex;
      flex-direction: column;
      gap: 1.2mm;
    }

    .social-item {
      display: grid;
      grid-template-columns: 3mm 10.5mm 1fr;
      gap: 0.8mm;
      align-items: center;
    }

    .social-icon {
      width: 3mm;
      height: 3mm;
      color: var(--gold);
      font-size: 4.8pt;
      line-height: 1;
      text-align: center;
    }

    .social-qr {
      width: 10.5mm;
      height: 10.5mm;
      display: block;
      background: #fff;
    }

    .social-label {
      font-size: 3.7pt;
      line-height: 1.25;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .print-hint {
      max-width: 91mm;
      margin: 8px auto 24px;
      padding: 0 12px;
      font-size: 12px;
      color: #333;
      font-family: system-ui, sans-serif;
    }

    @media print {
      body { background: white; }
      .sheet { margin: 0; box-shadow: none; }
      .print-hint { display: none; }
    }
  </style>
</head>
<body>
  <p class="print-hint">
  印刷：ブラウザで「印刷」→ 用紙 91×55mm（またはPDF保存後に印刷店テンプレへ配置）。背景のグラフィック印刷をオンにしてください。
  </p>

  <div class="sheet" id="card">
    <div class="brush brush-tl" aria-hidden="true"></div>
    <div class="inner">
      <div class="photos">
        <img class="photo top" src="名刺_suit.jpg" alt="" />
        <img class="photo bottom" src="名刺_match.jpg" alt="" />
      </div>

      <div class="content">
        <div>
          <div class="head">
            <div class="brand">
              <span class="brand-mark">VSB</span>
              <span class="brand-rule" aria-hidden="true"></span>
              <span>VSB（Venture Sports Base）代表</span>
            </div>
            <div class="titles">
              健康経営アドバイザー<br />
              第39回 全日本武術太極拳選手権大会 優勝<br />
              （日本代表 強化指定選手）
            </div>
          </div>

          <div class="name-block">
            <div class="name-ja">亀井 宥吏</div>
            <div class="name-en">Yuri Kamei</div>
            <div class="name-rule" aria-hidden="true"></div>
          </div>
        </div>

        <div class="footer">
          <div class="contact">
            <div class="contact-row">
              <span class="icon" aria-hidden="true">☎</span>
              <span><span class="contact-label">TEL：</span><span class="contact-value blank"></span></span>
            </div>
            <div class="contact-row">
              <span class="icon" aria-hidden="true">✉</span>
              <span><span class="contact-label">Email：</span><span class="contact-value blank"></span></span>
            </div>
            <div class="contact-row">
              <span class="icon" aria-hidden="true">⌂</span>
              <span><span class="contact-label">Web：</span><span class="contact-value">https://vsb-consulting.com</span></span>
            </div>
          </div>

          <div class="social">
            <div class="social-item">
              <span class="social-icon" aria-hidden="true">◎</span>
              <img class="social-qr" src="名刺_qr_instagram.png" alt="Instagram QRコード" />
              <span class="social-label">Instagram<br />公式アカウント</span>
            </div>
            <div class="social-item">
              <span class="social-icon" aria-hidden="true">f</span>
              <img class="social-qr" src="名刺_qr_facebook.png" alt="Facebook QRコード" />
              <span class="social-label">Facebook<br />公式アカウント</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
