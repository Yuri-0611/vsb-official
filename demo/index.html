<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>VSB デモ一覧（社内用）</title>
<style>
  :root{
    --green:#2f6b4f; --green-d:#143b2a; --green-l:#e8f3ed;
    --teal:#2fae8f; --navy:#274b8a; --warn:#d9822b; --alert:#e0574b;
    --ink:#1b2420; --muted:#5c6b63; --line:#dbe6df; --bg:#f3f7f4; --card:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;
    line-height:1.6; -webkit-text-size-adjust:100%;}
  .wrap{max-width:520px; margin:0 auto; padding:0 14px 40px;}
  .topbar{background:linear-gradient(135deg,var(--green-d),var(--green)); color:#fff;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom,0)); text-align:center;
    position:sticky; top:0; z-index:10; box-shadow:0 2px 10px rgba(0,0,0,.12);}
  .topbar .brand{font-size:12px; letter-spacing:.14em; opacity:.85;}
  .topbar h1{font-size:17px; margin:3px 0 2px;}
  .topbar .demo-tag{display:inline-block; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.4);
    font-size:11px; padding:2px 10px; border-radius:20px; margin-top:4px;}
  .section-label{display:flex; align-items:center; gap:8px; margin:26px 2px 10px; font-weight:700; color:var(--green-d);}
  .section-label .n{background:var(--green); color:#fff; width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:13px; flex:none;}
  .section-label .sub{font-size:11px; color:var(--muted); font-weight:500; margin-left:auto;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin:10px 0; box-shadow:0 4px 14px rgba(20,59,42,.05);}
  .card h2{font-size:15px; margin:0 0 12px; color:var(--green-d);}
  .card h3{font-size:13px; margin:14px 0 6px; color:var(--green-d);}
  .hero{background:linear-gradient(150deg,#2fae8f,#2f6b4f); color:#fff; text-align:center; border:none; padding:20px 16px;}
  .hero .cap{font-size:12px; opacity:.9;}
  .ring{position:relative; width:150px; height:150px; margin:10px auto 6px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .val{position:absolute; inset:0; display:grid; place-items:center;}
  .ring .val .num{font-size:44px; font-weight:800; line-height:1;}
  .ring .val .max{font-size:12px; opacity:.85;}
  .badge-hero{display:inline-block; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.5);
    padding:4px 16px; border-radius:20px; font-weight:700; font-size:14px;}
  .radar-box{display:flex; justify-content:center; padding:6px 0;}
  .legend{display:flex; gap:16px; justify-content:center; font-size:11px; color:var(--muted); margin-top:4px; flex-wrap:wrap;}
  .legend i{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:4px; vertical-align:-1px;}
  .note{font-size:12px; color:var(--muted); margin:6px 0 0;}
  .ctx{background:var(--green-l); border-color:#c9e0d5;}
  .ctx p{margin:0; font-size:12.5px; color:#2a4438;}
  .org-score{display:flex; align-items:center; gap:14px; margin-bottom:6px;}
  .org-score .big{font-size:40px; font-weight:800; color:var(--green-d); line-height:1;}
  .org-score .u{font-size:13px; color:var(--muted);}
  .pill{padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700; color:#fff;}
  .pill.warn{background:var(--warn);} .pill.good{background:var(--teal);} .pill.alert{background:var(--alert);}
  .axis-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; margin-top:12px;}
  .axis-item{display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed var(--line);}
  .axis-item b{color:var(--green-d);}
  .loss{background:linear-gradient(135deg,#fff4ec,#ffe9d8); border-color:#f0cfa8;}
  .loss .lbl{font-size:12px; color:var(--warn); font-weight:700;}
  .loss .yen{font-size:34px; font-weight:800; color:#c0631a; letter-spacing:-.5px; margin:2px 0;}
  .bar{display:flex; height:26px; border-radius:8px; overflow:hidden; margin:12px 0 6px; font-size:11px; color:#fff; font-weight:700;}
  .bar .prod{background:var(--teal); display:grid; place-items:center;}
  .bar .lo{background:var(--warn); display:grid; place-items:center;}
  .alert-item{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);}
  .alert-item:last-child{border-bottom:none;}
  .alert-item .ic{flex:none; width:26px; height:26px; border-radius:50%; display:grid; place-items:center; font-size:15px;}
  .ic.hi{background:#fde8e6; color:var(--alert);} .ic.mid{background:#fdf0e0; color:var(--warn);}
  .pri-badge{font-size:11px; font-weight:700; padding:1px 8px; border-radius:12px;}
  .pri-badge.hi{background:#fde8e6; color:var(--alert);} .pri-badge.mid{background:#fdf0e0; color:var(--warn);}
  .alert-item strong{display:block; font-size:14px; margin:3px 0 2px;}
  .alert-item p{margin:0; font-size:12.5px; color:var(--muted);}
  .prio{padding:10px 0; border-bottom:1px solid var(--line);}
  .prio:last-child{border-bottom:none;}
  .prio .rk{display:inline-block; background:var(--green); color:#fff; font-size:12px; font-weight:700; border-radius:6px; padding:1px 8px; margin-right:6px;}
  .prio h3{display:inline; font-size:14px;}
  .prio p{margin:5px 0 0; font-size:12.5px; color:var(--muted);}
  .prio p b{color:var(--ink);}
  ul.support{margin:6px 0 0; padding-left:18px;}
  ul.support li{font-size:13px; margin:4px 0;}
  .closing{font-size:12.5px; color:var(--muted); background:var(--green-l); border-radius:10px; padding:10px 12px; margin-top:10px;}
  .disclaimer{font-size:11px; color:#9aa8a0; text-align:center; margin:22px 6px 0; line-height:1.5;}
  .flow{display:flex; align-items:center; justify-content:center; gap:6px; font-size:11px; color:var(--muted); margin:14px 0 2px; flex-wrap:wrap;}
  .flow span{background:#fff; border:1px solid var(--line); border-radius:20px; padding:3px 10px;}
  .flow .arw{border:none; background:none; color:var(--green);}

  .hub-card{display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin:10px 0; text-decoration:none; color:var(--green-d); box-shadow:0 4px 14px rgba(20,59,42,.05);}
  .hub-name{font-size:16px; font-weight:700;}
  .hub-arrow{color:var(--green); font-size:18px;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">VSB CONSULTING</div>
    <h1>コンディションスキャン デモ一覧</h1>
    <div class="demo-tag">社内用｜企業別サンプル</div>
  </div>
  <div class="wrap">
    <p class="note" style="margin:18px 2px;">面談相手の業種・規模・働き方に合わせたデモです。相手に見せる際は各社のリンクを開いてください。</p>
      <a class="hub-card" href="./nihondust/">
        <span class="hub-name">日本ダスト様</span>
        <span class="hub-arrow">→</span>
      </a>
      <a class="hub-card" href="./marumo/">
        <span class="hub-name">マルモ通産様</span>
        <span class="hub-arrow">→</span>
      </a>
      <a class="hub-card" href="./skyplan/">
        <span class="hub-name">スカイプラン様</span>
        <span class="hub-arrow">→</span>
      </a>
    <p class="disclaimer">各デモはサンプルデータによる表示例です。実際の結果は回答内容により変わります。<br>VSB Consulting</p>
  </div>
</body>
</html>
