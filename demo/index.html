<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>VSB デモ一覧（社内用）</title>
<style>
  :root{--green:#2d6a6a;--green-d:#14343a;--line:#dbe6df;--muted:#5c6b63;--bg:#f3f7f4;}
  body{margin:0;background:var(--bg);color:#1b2420;font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;line-height:1.6;}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px 48px;}
  .topbar{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;padding:20px 16px;text-align:center;}
  .topbar .brand{font-size:12px;letter-spacing:.14em;opacity:.85;}
  .topbar h1{font-size:18px;margin:4px 0 2px;}
  .topbar .tag{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.4);font-size:11px;padding:2px 10px;border-radius:20px;margin-top:4px;}
  .note{font-size:13px;color:var(--muted);margin:20px 2px;}
  a.card{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin:12px 0;text-decoration:none;color:var(--green-d);box-shadow:0 4px 14px rgba(20,52,58,.05);}
  a.card .name{font-size:16px;font-weight:700;}
  a.card .sub{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}
  a.card .arrow{color:var(--green);font-size:18px;}
  .foot{font-size:11px;color:#9aa8a0;text-align:center;margin-top:24px;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">VSB CONSULTING</div>
    <h1>コンディションスキャン デモ一覧</h1>
    <div class="tag">社内用｜企業別サンプル</div>
  </div>
  <div class="wrap">
    <p class="note">面談相手の業種・規模・働き方に合わせたデモです。実際の結果画面・経営サマリーと同じデザインで表示されます（iPad／PC推奨）。相手に見せる際は各社のリンクを開いてください。</p>
    <a class="card" href="/scan/#/demo/nihondust"><span class="name">日本ダスト株式会社様<span class="sub">産廃・リサイクル／現業・ドライバー40名</span></span><span class="arrow">→</span></a>
    <a class="card" href="/scan/#/demo/marumo"><span class="name">マルモ通産株式会社様<span class="sub">海上コンテナ輸送／24名</span></span><span class="arrow">→</span></a>
    <a class="card" href="/scan/#/demo/skyplan"><span class="name">株式会社スカイプラン様<span class="sub">ダクト・空調設備／19名</span></span><span class="arrow">→</span></a>
    <p class="foot">各デモはサンプル（架空）データによる表示例です。実際の結果は回答内容により変わります。<br>VSB Consulting</p>
  </div>
</body>
</html>
