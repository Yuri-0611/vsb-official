<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1" />
  <title>ストーリー 4枚目</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1a1a; }
    .frame {
      width: min(100vw, 405px);
      aspect-ratio: 9 / 16;
      margin: 0 auto;
      background: linear-gradient(165deg, #132f4c 0%, #1e4a7a 50%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8%;
      font-family: "Noto Sans JP", sans-serif;
    }
    .wrap {
      text-align: center;
      width: 100%;
    }
    p {
      font-size: clamp(1rem, 4.8vw, 1.25rem);
      font-weight: 800;
      line-height: 1.7;
      color: #ffffff;
      letter-spacing: -0.02em;
    }
    .hint {
      margin-top: 1.75rem;
      font-size: clamp(0.8rem, 3.5vw, 0.95rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="wrap">
      <p>登録は<br />プロフィールのリンクから<br /><br />または<br />下の公式LINEから。</p>
      <p class="hint">ストーリーでは<br />リンクスタンプを<br />タップしてください。</p>
    </div>
  </div>
</body>
</html>
