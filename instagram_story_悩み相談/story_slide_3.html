<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1" />
  <title>ストーリー 3枚目</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1a1a; }
    .frame {
      width: min(100vw, 405px);
      aspect-ratio: 9 / 16;
      margin: 0 auto;
      background: linear-gradient(165deg, #e8f0ff 0%, #ffffff 45%, #dbeafe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8%;
      font-family: "Noto Sans JP", sans-serif;
    }
    .wrap {
      text-align: center;
      width: 100%;
    }
    p {
      font-size: clamp(0.95rem, 4.5vw, 1.2rem);
      font-weight: 700;
      line-height: 1.75;
      color: #132f4c;
      letter-spacing: -0.02em;
    }
    .sub {
      margin-top: 1rem;
      font-size: clamp(0.85rem, 4vw, 1.05rem);
      font-weight: 600;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="wrap">
      <p>あわせて、<br />全日本強化指定選手の<br />練習の様子も<br />LINEで届けます。</p>
      <p class="sub">（不定期）</p>
    </div>
  </div>
</body>
</html>
