      <h1 id="thanks-title">お問い合わせを受け付けました</h1>
      <p id="thanks-lead">ご連絡ありがとうございます。担当より<strong>数営業日以内</strong>にメールでご返信いたします。</p>
      <p class="form__note">返信メールが届かない場合は、迷惑メールフォルダをご確認のうえ、<a href="mailto:info@vsb-consulting.jp">info@vsb-consulting.jp</a> まで直接ご連絡ください。</p>

  </footer>
  <script src="assets/js/main.js" defer></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var type = params.get("type") || "inquiry";
      if (type === "booking") {
        var t = document.getElementById("thanks-title");
        var l = document.getElementById("thanks-lead");
        if (t) t.textContent = "無料相談のご予約を受け付けました";
        if (l) l.innerHTML = "ご希望ありがとうございます。担当より<strong>24時間以内</strong>に、確定日時をメールでご連絡します。";
      } else if (type === "materials") {
        var t2 = document.getElementById("thanks-title");
        var l2 = document.getElementById("thanks-lead");
        if (t2) t2.textContent = "資料請求を受け付けました";
        if (l2) l2.innerHTML = "ご請求ありがとうございます。担当より<strong>数営業日以内</strong>に、資料をメールでお送りします。";
      }
      if (typeof window.vsbTrackEvent === "function") {
        window.vsbTrackEvent("conversion", {
          conversion_type: type,
          page_path: location.pathname,
        });
      }
    })();
  </script>
